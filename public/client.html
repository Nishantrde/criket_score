<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mojo Pravah • Live Score</title>
  <style>
    :root {
      --bg: #f2f2f2;
      --surface: #ffffff;
      --text: #1f1f1f;
      --muted: #5a5a5a;
      --border: #d9d9d9;
      --accent: #f2c200;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.2px;
      margin-bottom: 10px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      border: 1px solid rgba(0,0,0,0.12);
      flex: 0 0 auto;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 22px;
      line-height: 1.2;
    }

    .sub {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 13px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
    }

    .teamCard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }

    .teamCard.active {
      border-color: rgba(0,0,0,0.25);
      box-shadow: 0 0 0 3px rgba(242, 194, 0, 0.35);
    }

    .teamHead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .teamName {
      font-weight: 850;
      letter-spacing: -0.3px;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .score {
      margin: 8px 0 10px;
      font-size: 52px;
      font-weight: 800;
      letter-spacing: -0.8px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
    }

    .pill {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--bg);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    @media (max-width: 480px) {
      .score { font-size: 44px; }
    }

    .hist {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .histItem {
      border: 1px solid var(--border);
      background: var(--bg);
      border-radius: 12px;
      padding: 10px 12px;
      display: grid;
      gap: 6px;
    }

    .histTop {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .histLine {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-weight: 750;
    }

    .histLine span {
      color: var(--muted);
      font-weight: 650;
    }

    .spanAll {
      grid-column: 1 / -1;
    }

    .playersHeader {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .playersSummary {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .teamRoster {
      display: grid;
      gap: 10px;
      padding-top: 12px;
    }

    .teamRoster.active {
      border-color: rgba(0,0,0,0.16);
      box-shadow: 0 0 0 2px rgba(242, 194, 0, 0.12);
      border-radius: 12px;
      padding: 12px;
      margin: -12px;
    }

    .teamRoster + .teamRoster {
      margin-top: 12px;
      border-top: 1px solid var(--border);
    }

    .teamRosterHeader {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .teamRosterName {
      font-weight: 850;
      font-size: 18px;
      letter-spacing: -0.2px;
    }

    .teamRosterMeta {
      color: var(--muted);
      font-size: 12px;
    }

    .playerList {
      display: grid;
      gap: 10px;
    }

    .playerRow {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) 92px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      border: 1px solid var(--border);
      background: var(--bg);
      border-radius: 12px;
      padding: 12px;
    }

    .playerField {
      display: grid;
      gap: 6px;
    }

    .playerActions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .playerBadge {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 11px;
      font-weight: 750;
      color: var(--muted);
    }

    .playerBadge.striker {
      background: #dff2e1;
      color: #184d27;
    }

    .playerBadge.non-striker {
      background: #e4ecff;
      color: #244280;
    }

    .playerBadge.out {
      background: #fde9e9;
      color: #8b2323;
    }

    .playerBadge.waiting {
      background: #f5f5f5;
      color: #555;
    }

    @media (max-width: 640px) {
      .playerRow {
        grid-template-columns: 1fr;
      }

      .playerActions {
        justify-content: flex-start;
      }
    }

    .titleRow {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="badge"><span class="dot"></span> Mojo Pravah • Conducted by Mojo Hostel</div>
    <h1>Live Cricket Score</h1>
    <p class="sub">Audience view (auto-updates)</p>

    <div class="grid">
      <section class="teamCard" id="teamABox">
        <div class="teamHead">
          <div>
            <div class="label">Team</div>
            <div class="teamName" id="teamAName">Team A</div>
          </div>
          <span class="pill" id="teamAActive" style="display:none;">Batting</span>
        </div>
        <div class="label">Score</div>
        <div class="score" id="teamAScore">0/0 (0.0)</div>
      </section>

      <section class="teamCard" id="teamBBox">
        <div class="teamHead">
          <div>
            <div class="label">Team</div>
            <div class="teamName" id="teamBName">Team B</div>
          </div>
          <span class="pill" id="teamBActive" style="display:none;">Batting</span>
        </div>
        <div class="label">Score</div>
        <div class="score" id="teamBScore">0/0 (0.0)</div>
      </section>
    </div>

    <div class="row" style="margin-top: 12px;">
      <span class="pill">Game: Cricket</span>
      <span class="pill">Event: Mojo Pravah (Mojo Hostel)</span>
    </div>

    <div class="card spanAll" style="margin-top: 14px;">
      <div class="playersHeader">
        <div>
          <div class="label">Players</div>
          <div style="font-weight: 850; font-size: 18px; margin-top: 4px;" id="playersTitle">Players</div>
        </div>
      </div>
      <div class="playersSummary">
        <span class="pill" id="strikerSummary">Striker: -</span>
        <span class="pill" id="nonStrikerSummary">Non-striker: -</span>
      </div>
      <div id="playersList" class="playerList"></div>
    </div>

    <div class="card" style="margin-top: 14px;">
      <div class="titleRow">
        <div>
          <div class="label">History</div>
          <div style="font-weight: 850; font-size: 18px;">Recorded Matches</div>
        </div>
        <button onclick="loadHistory()" style="border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 12px; padding: 10px 12px; font-weight: 650; cursor: pointer;">Refresh</button>
      </div>
      <div id="history" class="hist"></div>
    </div>
  </div>

  
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io({ transports: ["websocket", "polling"] });

    socket.on("connect", () => {
      console.log("socket connected", socket.id, "transport:", socket.io.engine.transport.name);
    });

    socket.io.engine.on("upgrade", (transport) => {
      console.log("transport upgraded to", transport.name);
    });

    function overToBalls(value) {
      const num = typeof value === "number" ? value : Number.parseFloat(String(value ?? "0"));
      const safe = Number.isFinite(num) && num >= 0 ? num : 0;
      const overs = Math.floor(safe);
      const balls = Math.round((safe - overs) * 10);
      return overs * 6 + Math.max(0, balls);
    }

    function ballsToOverNumber(totalBalls) {
      const safe = Number.isFinite(totalBalls) && totalBalls >= 0 ? Math.floor(totalBalls) : 0;
      const overs = Math.floor(safe / 6);
      const balls = safe % 6;
      return overs + balls / 10;
    }

    function normalizeOver(value) {
      return ballsToOverNumber(overToBalls(value));
    }

    function formatOver(value) {
      return normalizeOver(value).toFixed(1);
    }

    const VALID_PLAYER_STATUSES = new Set(["striker", "non-striker", "waiting", "out"]);

    function normalizePlayer(player, index = 0) {
      const rawName = String(player?.name ?? `Player ${index + 1}`).trim();
      const statusValue = String(player?.status || "").toLowerCase();
      const status = VALID_PLAYER_STATUSES.has(statusValue) ? statusValue : "waiting";
      const runs = Number(player?.runs ?? 0);

      return {
        id: String(player?.id ?? `player-${index + 1}`),
        name: rawName || `Player ${index + 1}`,
        runs: Number.isFinite(runs) && runs >= 0 ? Math.floor(runs) : 0,
        status
      };
    }

    function normalizePlayers(players) {
      const list = Array.isArray(players) ? players.map((player, index) => normalizePlayer(player, index)) : [];
      let strikerSeen = false;
      let nonStrikerSeen = false;

      return list.map((player) => {
        if (player.status === "striker") {
          if (strikerSeen) return { ...player, status: "waiting" };
          strikerSeen = true;
          return player;
        }

        if (player.status === "non-striker") {
          if (nonStrikerSeen) return { ...player, status: "waiting" };
          nonStrikerSeen = true;
          return player;
        }

        return player;
      });
    }

    function playerStatusLabel(status) {
      const normalized = String(status || "waiting");
      if (normalized === "non-striker") return "Non-striker";
      return normalized.charAt(0).toUpperCase() + normalized.slice(1);
    }

    function renderHistoryPlayers(players) {
      const list = Array.isArray(players) ? players : [];
      if (!list.length) {
        return `<span class="pill">No players</span>`;
      }

      return list
        .map((player) => {
          const status = String(player?.status || "waiting");
          const label = `${String(player?.name || "Player")} ${Number.isFinite(Number(player?.runs)) ? `(${Number(player.runs)})` : "(0)"}`;
          return `<span class="playerBadge ${escapeHtml(status)}">${escapeHtml(label)}</span>`;
        })
        .join("");
    }

    let history = [];

    function escapeHtml(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderHistory() {
      const box = document.getElementById("history");
      if (!Array.isArray(history) || history.length === 0) {
        box.innerHTML = `<div class="pill" style="width: fit-content;">No matches recorded yet.</div>`;
        return;
      }

      box.innerHTML = history
        .map((m) => {
          const created = m?.created_at ? new Date(m.created_at).toLocaleString() : "";
          const winnerName = m?.winner === "teamB" ? m?.teamB_name : m?.teamA_name;
          const teamAPlayers = Array.isArray(m?.teamA_players) ? m.teamA_players : [];
          const teamBPlayers = Array.isArray(m?.teamB_players) ? m.teamB_players : [];
          return `
            <div class="histItem">
              <div class="histTop">
                <div>${escapeHtml(created)}</div>
                <div>Winner: <b>${escapeHtml(winnerName || "")}</b></div>
              </div>
              <div class="histLine">
                <div>${escapeHtml(m?.teamA_name || "Team A")} <span>${m?.teamA_runs ?? 0}/${m?.teamA_wickets ?? 0} (${formatOver(m?.teamA_overs ?? 0)})</span></div>
              </div>
              <div class="histLine">
                <div>${escapeHtml(m?.teamB_name || "Team B")} <span>${m?.teamB_runs ?? 0}/${m?.teamB_wickets ?? 0} (${formatOver(m?.teamB_overs ?? 0)})</span></div>
              </div>
              <div class="histLine" style="display:grid; gap:8px;">
                <div>${escapeHtml(m?.teamA_name || "Team A")} players</div>
                <div class="playerActions" style="justify-content:flex-start;">
                  ${renderHistoryPlayers(teamAPlayers)}
                </div>
              </div>
              <div class="histLine" style="display:grid; gap:8px;">
                <div>${escapeHtml(m?.teamB_name || "Team B")} players</div>
                <div class="playerActions" style="justify-content:flex-start;">
                  ${renderHistoryPlayers(teamBPlayers)}
                </div>
              </div>
            </div>
          `;
        })
        .join("");
    }

    async function loadHistory() {
      try {
        const res = await fetch("/api/matches?limit=50");
        const json = await res.json().catch(() => ({}));
        if (!res.ok || !json.ok) {
          console.error(json.error || "Failed to load match history");
          return;
        }
        history = Array.isArray(json.matches) ? json.matches : [];
        renderHistory();
      } catch (err) {
        console.error(err);
      }
    }

    let match = {
      activeTeam: "teamA",
      teamA: { name: "Team A", runs: 0, wickets: 0, over: 0.0, players: [] },
      teamB: { name: "Team B", runs: 0, wickets: 0, over: 0.0, players: [] }
    };

    function normalizeTeam(team, fallbackName) {
      const name = String(team?.name ?? fallbackName);
      const runs = Number(team?.runs ?? 0);
      const wickets = Number(team?.wickets ?? 0);
      const over = normalizeOver(team?.over);
      return {
        name: name || fallbackName,
        runs: Number.isFinite(runs) && runs >= 0 ? Math.floor(runs) : 0,
        wickets: Number.isFinite(wickets) && wickets >= 0 ? Math.floor(wickets) : 0,
        over,
        players: normalizePlayers(team?.players)
      };
    }

    function normalizeMatch(state) {
      const activeTeam = state?.activeTeam === "teamB" ? "teamB" : "teamA";
      return {
        activeTeam,
        teamA: normalizeTeam(state?.teamA, "Team A"),
        teamB: normalizeTeam(state?.teamB, "Team B")
      };
    }

    function getTeam(teamKey) {
      return teamKey === "teamB" ? match.teamB : match.teamA;
    }

    function render() {
      const a = match.teamA;
      const b = match.teamB;

      document.getElementById("teamAName").innerText = a.name;
      document.getElementById("teamBName").innerText = b.name;
      document.getElementById("teamAScore").innerText = `${a.runs}/${a.wickets} (${formatOver(a.over)})`;
      document.getElementById("teamBScore").innerText = `${b.runs}/${b.wickets} (${formatOver(b.over)})`;

      const aActive = match.activeTeam === "teamA";
      document.getElementById("teamAActive").style.display = aActive ? "inline-flex" : "none";
      document.getElementById("teamBActive").style.display = aActive ? "none" : "inline-flex";
      document.getElementById("teamABox").className = aActive ? "teamCard active" : "teamCard";
      document.getElementById("teamBBox").className = aActive ? "teamCard" : "teamCard active";
      renderPlayers();
    }

    function renderTeamRoster(teamKey) {
      const team = getTeam(teamKey);
      const isActiveTeam = match.activeTeam === teamKey;
      const players = Array.isArray(team.players) ? team.players : [];

      const rows = players.length
        ? players
            .map((player) => {
              const badgeLabel = playerStatusLabel(player.status);
              return `
                <div class="playerRow">
                  <div class="playerField">
                    <div class="label">Player</div>
                    <div style="font-weight: 800; font-size: 15px;">${escapeHtml(player.name)}</div>
                  </div>
                  <div class="playerField">
                    <div class="label">Runs</div>
                    <div style="font-size: 16px; font-weight: 850;">${player.runs}</div>
                  </div>
                  <div class="playerActions">
                    <span class="playerBadge ${escapeHtml(player.status)}">${escapeHtml(badgeLabel)}</span>
                  </div>
                </div>
              `;
            })
            .join("")
        : `<div class="pill" style="width: fit-content;">No players added yet.</div>`;

      return `
        <section class="teamRoster ${isActiveTeam ? "active" : ""}">
          <div class="teamRosterHeader">
            <div>
              <div class="label">${escapeHtml(teamKey === "teamA" ? "Team A" : "Team B")}</div>
              <div class="teamRosterName">${escapeHtml(team.name)}</div>
              <div class="teamRosterMeta">${players.length} players</div>
            </div>
            <span class="pill">${isActiveTeam ? "Batting" : "Roster"}</span>
          </div>
          <div class="playerList">
            ${rows}
          </div>
        </section>
      `;
    }

    function renderPlayers() {
      const title = document.getElementById("playersTitle");
      const strikerSummary = document.getElementById("strikerSummary");
      const nonStrikerSummary = document.getElementById("nonStrikerSummary");
      const list = document.getElementById("playersList");

      const team = getTeam(match.activeTeam);
      if (title) title.innerText = "Team Rosters";

      const striker = team.players.find((player) => player.status === "striker");
      const nonStriker = team.players.find((player) => player.status === "non-striker");

      if (strikerSummary) strikerSummary.innerText = striker ? `Striker: ${striker.name} (${striker.runs})` : "Striker: -";
      if (nonStrikerSummary) nonStrikerSummary.innerText = nonStriker ? `Non-striker: ${nonStriker.name} (${nonStriker.runs})` : "Non-striker: -";

      if (!list) return;

      list.innerHTML = [renderTeamRoster("teamA"), renderTeamRoster("teamB")].join("");
    }

    socket.on("matchUpdate", (data) => {
      match = normalizeMatch(data);
      render();
    });

    socket.on("matchesUpdate", (rows) => {
      if (Array.isArray(rows)) {
        history = rows;
        renderHistory();
      }
    });

    // fallback: if only scoreUpdate is received, treat it as active team score
    socket.on("scoreUpdate", (data) => {
      const t = normalizeTeam(data, match.activeTeam === "teamB" ? "Team B" : "Team A");
      if (match.activeTeam === "teamB") match.teamB = t;
      else match.teamA = t;
      render();
    });

    loadHistory();

  </script>
</body>
</html>
