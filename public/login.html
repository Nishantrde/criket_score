<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login • Mojo Pravah</title>
  <style>
    :root {
      --bg: #f2f2f2;
      --surface: #ffffff;
      --text: #1f1f1f;
      --muted: #5a5a5a;
      --border: #d9d9d9;
      --accent: #f2c200;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px 16px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.2px;
      margin-bottom: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      border: 1px solid rgba(0,0,0,0.12);
      flex: 0 0 auto;
    }

    h1 { margin: 0 0 6px; font-size: 22px; }
    p { margin: 0 0 14px; color: var(--muted); font-size: 13px; line-height: 1.4; }

    a.btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      border: 1px solid rgba(0,0,0,0.12);
      background: var(--accent);
      color: var(--text);
      border-radius: 12px;
      padding: 12px 12px;
      font-weight: 750;
      text-decoration: none;
      cursor: pointer;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    code { background: var(--bg); padding: 2px 6px; border-radius: 8px; border: 1px solid var(--border); }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge"><span class="dot"></span> Mojo Pravah • Cricket Scoring</div>
    <h1>Sign in</h1>
    <p>Use Google login to access the live client view. Admin access is restricted to approved Gmail accounts.</p>
    <a class="btn" href="/auth/google">Continue with Google</a>
    <div class="hint">If you’re running locally, set <code>GOOGLE_CLIENT_ID</code> and <code>GOOGLE_CLIENT_SECRET</code>.</div>
  </div>
</body>
</html>
